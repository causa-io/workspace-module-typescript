name: 👷 CI

on:
  pull_request:
  push:
    branches: [main]
    tags: [v*]

jobs:
  test:
    name: 🧪 Build and test
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v6

      - name: 🔨 Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: 🔨 Install Causa
        run: npm install -g @causa/cli

      - name: 🔨 Restore Causa modules
        uses: actions/cache@v5
        with:
          path: |
            .causa/package*
            .causa/node_modules
          key: ${{ runner.os }}-${{ hashFiles('causa.yaml') }}

      - name: 🐛 Flatten Causa dependencies
        run: cs init || cd .causa && npm dedup

      - name: 🎉 Initialize
        run: cs init

      - name: 🍱 Build
        run: cs build

      - name: 🧪 Test
        run: cs test

      - name: 🎨 Lint
        run: cs lint

      - name: 🔍 Dependency check
        run: cs dep check

  publish:
    name: 🚀 Publish
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      id-token: write

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v6

      - name: 🔨 Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: 🔨 Install Causa
        run: npm install -g @causa/cli

      - name: 🔨 Restore Causa modules
        uses: actions/cache@v5
        with:
          path: |
            .causa/package*
            .causa/node_modules
          key: ${{ runner.os }}-${{ hashFiles('causa.yaml') }}

      - name: 🐛 Flatten Causa dependencies
        run: cs init || cd .causa && npm dedup

      - name: 🎉 Initialize
        run: cs init

      - name: 🚀 Publish
        run: cs publish -t semantic
